<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北寂 Endisk | 正在搭建中...</title>
    
    <!-- 引入你现有的样式表，继承 OPPO Sans 字体和所有底层主题变量 -->
    <link rel="stylesheet" href="css/styles.css">

    <style>
        /* 提示页专属全局布局 */
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden; 
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            background: var(--bg); 
            transition: background 0.3s ease;
        }

        /* 照搬原版背景画布容器 */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
            background: var(--bg);
        }

        /* 将原版 ball-1 和 ball-2 强行居中重叠 */
        .bg .ball {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            transition: transform 0.15s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .bg .ball-1 {
            width: 500px;
            height: 500px;
            margin-left: -250px;
            margin-top: -250px;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.35) 0%, rgba(0, 229, 255, 0) 70%);
            filter: blur(40px);
        }

        .bg .ball-2 {
            display: block !important; 
            width: 450px;
            height: 450px;
            margin-left: -225px;
            margin-top: -225px;
            background: radial-gradient(circle, rgba(238, 130, 238, 0.28) 0%, rgba(238, 130, 238, 0) 70%);
            filter: blur(45px);
        }

        /* 暗色（黑夜）模式下微调原本两颗球的透明度 */
        .dark .bg .ball-1, [data-theme="dark"] .bg .ball-1 {
            background: radial-gradient(circle, rgba(0, 229, 255, 0.45) 0%, rgba(0, 229, 255, 0) 70%);
        }
        .dark .bg .ball-2, [data-theme="dark"] .bg .ball-2 {
            background: radial-gradient(circle, rgba(238, 130, 238, 0.35) 0%, rgba(238, 130, 238, 0) 70%);
        }

        /* 原版光标跟随发光效果 */
        .cursor-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 2;
            background: radial-gradient(circle, rgba(0, 191, 255, 0.12) 0%, rgba(0, 191, 255, 0) 65%);
        }

        /* 主文字内容容器 */
        .content-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: 'OPPOSans', sans-serif;
            z-index: 10; 
            user-select: none;
            cursor: default;
            padding: 0 20px;
        }

        /* 主副标题 */
        .maint-title {
            color: var(--text);
            font-size: clamp(28px, 4.5vw, 56px);
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
            transition: color 0.3s ease;
        }

        .maint-subtitle {
            color: var(--sub);
            font-size: clamp(14px, 1.8vw, 18px);
            font-weight: 400;
            margin-bottom: 48px;
            opacity: 0.85;
            transition: color 0.3s ease;
        }

        /* 返回首页按钮 */
        .home-btn {
            display: inline-block;
            text-decoration: none;
            background-color: var(--card); 
            color: var(--text);
            border: 1px solid var(--border);
            padding: 14px 38px;
            border-radius: 9999px;
            font-size: 15px;
            font-weight: 500;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1), color 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
        }

        .home-btn:hover {
            transform: translateY(-3px) scale(1.08); 
            color: #00bfff; 
            border-color: rgba(0, 191, 255, 0.4);
            box-shadow: 0 12px 30px rgba(0, 191, 255, 0.18);
        }
        
        .home-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* 底部版权声明区域 */
        .maint-footer {
            width: 100%;
            text-align: center;
            padding: 30px 20px;
            font-family: 'OPPOSans', sans-serif;
            font-size: 12px;
            color: var(--sub);
            opacity: 0.65;
            line-height: 1.8;
            z-index: 10;
            user-select: none;
            box-sizing: border-box;
        }
    </style>
    
    <!-- 【关键改进 1】：将 theme.js 提到 head 头部加载 -->
    <!-- 这样如果 theme.js 里有自执行的 initTheme()，能第一时间接管本页的主题控制权 -->
    <script src="js/theme.js"></script>
</head>

<body>

    <!-- 背景画布区域 -->
    <div class="bg">
        <div class="ball ball-1"></div>
        <div class="ball ball-2"></div>
        <div class="cursor-glow" id="maintGlow"></div>
    </div>

    <!-- 核心提示文字内容 -->
    <div class="content-wrap">
        <h1 class="maint-title">本页全新升级中，正在搭建...</h1>
        <p class="maint-subtitle">This page is under construction and will be fully upgraded soon!</p>
        
        <a href="index.html" class="home-btn">
            返回首页
        </a>
    </div>

    <!-- 底部版权信息声明 -->
    <footer class="maint-footer">
        <div>版权所有 © 2026 北寂 Endisk</div>
        <div>Design by LAINIE Design | 本网站基于 GitHub Pages 搭建</div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ball1 = document.querySelector('.ball-1');
            const ball2 = document.querySelector('.ball-2');
            const glow = document.getElementById('maintGlow');
            
            // 鼠标移动交互
            document.addEventListener('mousemove', e => {
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                
                if (ball1) ball1.style.transform = `translate(${(x - 0.5) * 60}px, ${(y - 0.5) * 60}px)`;
                if (ball2) ball2.style.transform = `translate(${(0.5 - x) * 50}px, ${(0.5 - y) * 50}px)`;
                if (glow) {
                    glow.style.left = e.clientX + 'px';
                    glow.style.top = e.clientY + 'px';
                }
            });

            // --- 【关键改进 2】：全相容式主页颜色强制绑定逻辑 ---
            const applyTheme = (themeName) => {
                if (themeName === 'dark') {
                    // 兼容类名模式（.dark）和属性模式（data-theme="dark"），双重保险
                    document.documentElement.classList.add('dark');
                    document.documentElement.setAttribute('data-theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    document.documentElement.removeAttribute('data-theme');
                }
            };

            // 1. 初始化检查：优先使用主页 theme.js 里的原生初始化函数，若没有则读取 localStorage
            if (typeof initTheme === 'function') {
                initTheme();
            } else if (typeof window.initTheme === 'function') {
                window.initTheme();
            } else {
                // 自研保底逻辑：读取你主页存储的主题键名
                // 常见的键名有 'siteTheme', 'theme', 'appearance'。这里做全面匹配：
                const currentTheme = localStorage.getItem('siteTheme') || localStorage.getItem('theme') || localStorage.getItem('appearance');
                if (currentTheme) {
                    applyTheme(currentTheme);
                } else {
                    // 如果连主页都还没存过，再降级跟随系统
                    const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    applyTheme(systemDark ? 'dark' : 'light');
                }
            }

            // 2. 实时跨页面监听：当你在另一个标签页（主页）点击切换按钮时，强行同步
            window.addEventListener('storage', (e) => {
                // 只要本地存储发生变化，不管是哪个键名变了（siteTheme 或 theme），直接重新应用主题
                if (e.key === 'siteTheme' || e.key === 'theme' || e.key === 'appearance') {
                    applyTheme(e.newValue);
                }
            });
        });
    </script>

</body>

</html>
